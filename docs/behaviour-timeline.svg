<text x="503" y="290" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888780">until scene settled</text>
<text x="503" y="302" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888780">blobs &lt;= 1</text>

<line x1="547" y1="156" x2="547" y2="132" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2"/>
<rect x="496" y="118" width="102" height="14" rx="3" fill="#F1EFE8"/>
<text x="547" y="127" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888780">bgreset at 1.5s</text>

<path d="M 340 200 L 340 310" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2"/>
