<g>
  <rect x="434" y="160" width="46" height="36" rx="4" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="457" y="178" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="9" fill="#2C2C2A">SLEEP</text>
</g>

<g>
  <rect x="482" y="160" width="42" height="36" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="503" y="178" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#4A1B0C">SCARED</text>
</g>

<g>
  <rect x="526" y="160" width="42" height="36" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="547" y="178" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#412402">WAKING</text>
</g>

<g>
  <rect x="570" y="160" width="88" height="36" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="614" y="178" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#04342C">SCANNING</text>
</g>

