<path d="M 482 218 L 482 258 L 523 258 L 523 218" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="503" y1="258" x2="503" y2="265" stroke="#B4B2A9" stroke-width="0.5"/>
