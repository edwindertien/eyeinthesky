<svg width="680" height="500" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img">
<title>EyeWatcher behaviour state timeline</title>
<desc>Timeline showing eye states from boot through waking, scanning, tracking, dozing and sleeping, with a scared interruption, and all adjustable time parameters labeled</desc>

<rect width="680" height="500" fill="#ffffff"/>

<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#63B522" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrCoral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text x="340" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Behaviour timeline</text>
<text x="340" y="44" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888780">typical cycle from boot, showing all adjustable time parameters</text>

<text x="50" y="90" text-anchor="end" font-family="sans-serif" font-size="12" fill="#5F5E5A">arousal</text>
<text x="50" y="102" text-anchor="end" font-family="sans-serif" font-size="12" fill="#888780">lid open</text>

<text x="50" y="200" text-anchor="end" font-family="sans-serif" font-size="12" fill="#5F5E5A">state</text>

<rect x="58" y="64" width="600" height="60" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<line x1="58" y1="117" x2="658" y2="117" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="55" y="120" text-anchor="end" font-family="sans-serif" font-size="10" fill="#888780">0</text>
<text x="55" y="72" text-anchor="end" font-family="sans-serif" font-size="10" fill="#888780">1</text>

