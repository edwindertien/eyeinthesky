<text x="185" y="329" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888780">scanPanAmp / scanTiltAmp</text>

<path d="M 69 200 L 69 340" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2"/>
<rect x="30" y="338" width="120" height="24" rx="4" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
