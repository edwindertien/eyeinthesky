  C 415 100 420 112 430 112
  C 440 112 445 117 455 117
  L 480 117
  C 498 117 508 117 520 117
  C 540 117 550 76 568 76
  L 640 78
  L 658 78
" fill="none" stroke="#7eb8f7" stroke-width="2"/>

<g>
  <rect x="58" y="160" width="22" height="36" rx="4" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="69" y="180" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="8" fill="#2C2C2A">SLEEP</text>
</g>

<g>
  <rect x="82" y="160" width="52" height="36" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
