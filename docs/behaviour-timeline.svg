<text x="90" y="359" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888780">visionBgSettled gated</text>

<rect x="58" y="386" width="12" height="12" rx="2" fill="#D3D1C7"/>
<text x="75" y="395" font-family="sans-serif" font-size="12" fill="#5F5E5A">SLEEPING</text>
