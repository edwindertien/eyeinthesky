<line x1="568" y1="156" x2="568" y2="200" stroke="#D3D1C7" stroke-width="0.5"/>

<path d="M 82 218 L 82 228 L 133 228 L 133 218" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="108" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">~3.5s</text>
<text x="108" y="252" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888780">wakeDelayMs</text>

<path d="M 136 218 L 136 238 L 204 238 L 204 218" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="170" y1="238" x2="170" y2="245" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="170" y="258" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">scandoze</text>
<text x="170" y="270" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888780">default 10s</text>

<path d="M 256 148 L 256 132 L 256 118" fill="none" stroke="#63B522" stroke-width="1" marker-end="url(#arrGreen)"/>
<rect x="200" y="110" width="112" height="14" rx="3" fill="#F1EFE8"/>
<text x="256" y="119" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3B6D11">motion detected  (score &gt; 0.10)</text>

<line x1="280" y1="66" x2="280" y2="58" stroke="#EF9F27" stroke-width="1" marker-end="url(#arrAmber)"/>
<text x="280" y="54" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#BA7517">startle spike (500ms)</text>

<path d="M 370 218 L 370 228 L 431 228 L 431 218" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
<line x1="401" y1="228" x2="401" y2="245" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="401" y="258" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">dozesleep</text>
<text x="401" y="270" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888780">default 20s</text>

