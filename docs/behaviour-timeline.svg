<text x="463" y="395" font-family="sans-serif" font-size="12" fill="#5F5E5A">FOCUS</text>
<rect x="520" y="386" width="12" height="12" rx="2" fill="#F0997B"/>
<text x="537" y="395" font-family="sans-serif" font-size="12" fill="#5F5E5A">SCARED</text>

<rect x="58" y="414" width="600" height="66" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="72" y="428" font-family="sans-serif" font-size="10" letter-spacing="0.5" fill="#888780">ADJUSTABLE PARAMETERS</text>
<text x="72" y="443" font-family="sans-serif" font-size="12" fill="#5F5E5A">scandoze &lt;s&gt;</text>
<text x="72" y="455" font-family="sans-serif" font-size="10" fill="#888780">scan -&gt; doze  (default 10s)</text>
<text x="72" y="470" font-family="sans-serif" font-size="10" fill="#888780">web UI slider or serial</text>

<text x="220" y="443" font-family="sans-serif" font-size="12" fill="#5F5E5A">dozesleep &lt;s&gt;</text>
<text x="220" y="455" font-family="sans-serif" font-size="10" fill="#888780">doze -&gt; sleep  (default 20s)</text>
<text x="220" y="470" font-family="sans-serif" font-size="10" fill="#888780">web UI slider or serial</text>

<text x="368" y="443" font-family="sans-serif" font-size="12" fill="#5F5E5A">habit.str / habit.thr</text>
<text x="368" y="455" font-family="sans-serif" font-size="10" fill="#888780">how fast static blobs bore eye</text>
<text x="368" y="470" font-family="sans-serif" font-size="10" fill="#888780">serial only: habit.str 0.008</text>

<text x="520" y="443" font-family="sans-serif" font-size="12" fill="#5F5E5A">shift &lt;f&gt;</text>
<text x="520" y="455" font-family="sans-serif" font-size="10" fill="#888780">shift sensitivity (0.45)</text>
<text x="520" y="470" font-family="sans-serif" font-size="10" fill="#888780">web UI slider or serial</text>

