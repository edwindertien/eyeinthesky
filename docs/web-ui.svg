<text x="434" y="258" fill="#888780" font-size="10" font-family="sans-serif">no reboot needed</text>

<line x1="376" y1="354" x2="430" y2="354" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="434" y="358" fill="#5F5E5A" font-size="12" font-family="sans-serif">Any serial command</text>

