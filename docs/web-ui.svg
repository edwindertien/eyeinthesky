<text x="434" y="396" fill="#5F5E5A" font-size="12" font-family="sans-serif">Scrolling log</text>
<text x="434" y="408" fill="#888780" font-size="10" font-family="sans-serif">state changes + events</text>

<line x1="184" y1="183" x2="148" y2="183" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2"/>
<text x="144" y="179" text-anchor="end" fill="#5F5E5A" font-size="12" font-family="sans-serif">Switch pipeline</text>
<text x="144" y="191" text-anchor="end" fill="#888780" font-size="10" font-family="sans-serif">blob or saliency</text>

<line x1="184" y1="347" x2="148" y2="347" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2"/>
