</g>
<g>
  <rect x="412" y="240" width="188" height="40" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="506" y="260" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Calibration  (NVS)</text>
</g>
<g>
  <rect x="412" y="294" width="188" height="40" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="506" y="314" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">WebSocket push</text>
</g>
<g>
  <rect x="412" y="348" width="188" height="40" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="506" y="368" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Serial commands</text>
</g>

