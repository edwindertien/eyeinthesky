  <text x="280" y="115" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">vision task (FreeRTOS)</text>
</g>

<g>
  <rect x="396" y="76" width="220" height="328" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
