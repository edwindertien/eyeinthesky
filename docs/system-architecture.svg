<line x1="280" y1="226" x2="280" y2="238" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<line x1="280" y1="280" x2="280" y2="292" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<g>
  <rect x="412" y="132" width="188" height="40" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
