</g>
<g>
  <rect x="200" y="240" width="160" height="40" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="280" y="260" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Blob tracker</text>
</g>
<g>
