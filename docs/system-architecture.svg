<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>EyeWatcher system block diagram</title>
<desc>Hardware and software architecture showing ESP32-S3 dual-core split, camera pipeline, servo control, and WiFi web interface</desc>

<rect width="680" height="520" fill="#ffffff"/>

<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text x="30" y="38" font-family="sans-serif" font-size="10" letter-spacing="1" fill="#888780" style="text-transform:uppercase">Hardware</text>
<line x1="30" y1="44" x2="650" y2="44" stroke="#D3D1C7" stroke-width="0.5"/>

<g>
  <rect x="30" y="56" width="110" height="52" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="85" y="77" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Camera</text>
  <text x="85" y="95" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">OV3660 / OV2640</text>
</g>

<g>
  <rect x="30" y="130" width="110" height="52" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="85" y="151" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">8Servo unit</text>
  <text x="85" y="169" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">M5Stack I2C</text>
</g>

<g>
  <rect x="30" y="204" width="110" height="68" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="85" y="222" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">4x Servo</text>
  <text x="85" y="240" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">pan / tilt</text>
  <text x="85" y="258" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">lid top / bot</text>
</g>

<g>
  <rect x="30" y="310" width="110" height="52" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="85" y="331" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Mobile phone</text>
  <text x="85" y="349" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">WiFi AP client</text>
</g>

<rect x="170" y="48" width="460" height="380" rx="16" fill="none" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="5 3"/>
<text x="185" y="66" font-family="sans-serif" font-size="12" fill="#888780">ESP32-S3  |  8 MB PSRAM  |  240 MHz dual-core</text>

<g>
  <rect x="184" y="76" width="192" height="328" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
