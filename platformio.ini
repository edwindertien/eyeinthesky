; ═══════════════════════════════════════════════════════════════════════════
;  EyeWatcher — PlatformIO project configuration
;  Target: Seeed Studio XIAO ESP32-S3 Sense
; ═══════════════════════════════════════════════════════════════════════════

[env:seeed_xiao_esp32s3]
platform  = espressif32 @ ^6.2.0
board     = seeed_xiao_esp32s3
framework = arduino

; ── Memory ──────────────────────────────────────────────────────────────────
; OPI PSRAM: enables the 8MB external PSRAM — essential for camera frame buffers
board_build.arduino.memory_type = qio_opi
build_flags =
    -I include                      ; make include/ visible to all source files
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1     ; USB Serial via CDC (no UART adapter needed)
    -DCORE_DEBUG_LEVEL=3            ; Info-level logs; set to 0 for release

; ── Upload / Monitor ────────────────────────────────────────────────────────
upload_speed   = 921600
monitor_speed  = 115200
monitor_filters =
    esp32_exception_decoder         ; Auto-decodes crash stack traces

; ── Partition scheme ────────────────────────────────────────────────────────
; min_spiffs: ~3MB app + ~1.5MB SPIFFS for web assets (HTML/JS served by AP)
board_build.partitions = min_spiffs.csv

; ── Libraries ───────────────────────────────────────────────────────────────
; NOTE: No PCA9685 lib — M5 8Servo unit uses a simple raw Wire register map.
;       See include/m5servo8.h for the full driver (~60 lines).
lib_deps =
    bblanchon/ArduinoJson @ ^7.1.0   ; JSON for config save/load + web API
    ; ESP32 camera driver is bundled with espressif32 platform — no extra dep needed