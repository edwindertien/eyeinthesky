; ═══════════════════════════════════════════════════════════════════════════
;  EyeWatcher — PlatformIO project configuration
;  Target: Seeed Studio XIAO ESP32-S3 Sense
;  Stage 1: servo animation only (no camera yet)
; ═══════════════════════════════════════════════════════════════════════════

[env:seeed_xiao_esp32s3]
platform  = espressif32 @ ^6.2.0
board     = seeed_xiao_esp32s3
framework = arduino

; ── Header search paths ──────────────────────────────────────────────────────
; $PROJECT_INCLUDE_DIR resolves to the project include/ folder
build_flags =
    -I${PROJECT_INCLUDE_DIR}
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DUNIT_ID=1                    ; Eye unit number -- change per device

; ── Memory ───────────────────────────────────────────────────────────────────
; OPI PSRAM — required for XIAO ESP32-S3 Sense 8 MB PSRAM
board_build.arduino.memory_type = qio_opi

; ── Upload / Monitor ─────────────────────────────────────────────────────────
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

; ── Partition scheme ─────────────────────────────────────────────────────────
; min_spiffs: ~3 MB app + ~1.5 MB SPIFFS (reserved for web UI in later stages)
board_build.partitions = min_spiffs.csv

; ── Libraries ────────────────────────────────────────────────────────────────
lib_deps =
    bblanchon/ArduinoJson @ ^7.1.0
    https://github.com/ESP32Async/AsyncTCP.git
    https://github.com/ESP32Async/ESPAsyncWebServer.git